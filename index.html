<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baromètre Social - Airbus Helicopters</title>
    <!-- Chargement de la police premium Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Barre de navigation supérieure (Header Executive) -->
    <header>
        <div class="header-left">
            <!-- Logo officiel Airbus en SVG Vectoriel -->
            <svg class="airbus-logo" viewBox="0 0 180 20" xmlns="http://www.w3.org/2000/svg" style="width: 150px; height: auto;">
    <text x="0" y="16" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#FFFFFF" letter-spacing="3">AIRBUS</text>
</svg>
            <div class="app-branding">
                <h1>Baromètre Social</h1>
                <span>Espace Digital HRBP • Helicopters</span>
            </div>
        </div>
<div class="header-right" style="display: flex; align-items: center; gap: 1rem;">
    <button onclick="exportArchives()" style="background: var(--airbus-amber); color: var(--airbus-navy); font-weight: 700; border: none; padding: 0.6rem 1.2rem; border-radius: 50px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s;">
        📁 Accéder aux Archives (.json)
    </button>
    <div class="header-date" id="currentDate">-- / -- / ----</div>
</div>
    </header>

    <!-- Layout principal en grille asymétrique -->
    <main>
        <!-- Formulaire de saisie HRBP -->
        <section class="form-container">
            <div class="form-header">
                <h2>Nouvelle implémentation</h2>
                <p>Consigner les signaux faibles et forts du terrain</p>
            </div>
            
            <form id="barometreForm">
    <div class="form-group">
        <label for="sector">Secteur / Direction</label>
        <select id="sector" required>
            </select>
    </div>

    <div class="form-group">
        <label for="hrbpName">HRBP Référent (Automatique)</label>
        <input type="text" id="hrbpName" style="font-weight: 600; color: #002244; background-color: #E2E8F0;" placeholder="Nom du HRBP..." readonly>
    </div>

    <div class="form-group">
        <label for="title">Sujet / Thématique</label>
        <input type="text" id="title" placeholder="Ex: Climat d'équipe, Charge de travail..." required>
    </div>

    <div class="form-group">
        <label for="description">Explications / Contexte</label>
        <textarea id="description" placeholder="Détails factuels du constat..." required></textarea>
    </div>

    <div class="form-group">
        <label for="rating">Évaluation de l'impact</label>
        <select id="rating" required>
            <option value="1">🛑 1 - Impact critique / Alerte rouge</option>
            <option value="2">⚠️ 2 - Point d'attention / Tension</option>
            <option value="3">👍 3 - Climat Stable / Neutre</option>
            <option value="4">✨ 4 - Point Fort / Événement Positif</option>
        </select>
    </div>

    <button type="submit" class="btn-submit">Enregistrer sur le Dashboard</button>
</form>

        </section>

        <!-- Zone d'affichage du flux des indicateurs -->
<section class="dashboard-container">
    <div class="dashboard-header">
        <h2>Indicateurs & Sujets en cours</h2>
        <div class="live-pulse"></div>
    </div>
    
    <div class="kpi-dashboard-bar" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1rem;">
        <div style="background: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-subtle); text-align: center;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);">Moyenne ED</p>
            <h3 id="score-ED" style="font-size: 1.4rem; font-weight: 800; margin-top: 0.25rem;">--</h3>
        </div>
        <div style="background: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-subtle); text-align: center;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);">Moyenne ET</p>
            <h3 id="score-ET" style="font-size: 1.4rem; font-weight: 800; margin-top: 0.25rem;">--</h3>
        </div>
        <div style="background: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-subtle); text-align: center;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);">Moyenne ES</p>
            <h3 id="score-ES" style="font-size: 1.4rem; font-weight: 800; margin-top: 0.25rem;">--</h3>
        </div>
        <div style="background: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-subtle); text-align: center;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);">Moyenne Corporate</p>
            <h3 id="score-Corporate" style="font-size: 1.4rem; font-weight: 800; margin-top: 0.25rem;">--</h3>
        </div>
        <div style="background: var(--airbus-navy); padding: 1rem; border-radius: 12px; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,34,68,0.15);">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--airbus-amber);">GLOBAL SITE</p>
            <h3 id="score-Site" style="font-size: 1.4rem; font-weight: 800; margin-top: 0.25rem; color: white;">--</h3>
        </div>
    </div>
    
    <div id="subjectsList">
        </div>
</section>
    </main>

    <!-- Lien vers le fichier JavaScript -->
    <script src="script.js"></script>
</body>
</html>
